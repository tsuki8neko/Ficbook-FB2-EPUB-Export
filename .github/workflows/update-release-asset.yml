name: Update Release Asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag of the release to update (example: v1.0.0)"
        required: true

jobs:
  update-asset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build userscript
        run: npm run build

      # Коммитим обновлённый файл в репозиторий
      - name: Commit updated userscript
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet ficbook-export.user.js; then
            echo "No changes in userscript, skipping commit"
          else
            git add ficbook-export.user.js
            git commit -m "Update userscript via update-release-asset workflow"
            git push
          fi

      # Получаем релиз по тегу
      - name: Get release by tag
        id: get_release
        run: |
          release=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.inputs.tag }})

          upload_url=$(echo "$release" | jq -r '.upload_url')
          if [ "$upload_url" = "null" ] || [ -z "$upload_url" ]; then
            echo "ERROR: Release not found for tag '${{ github.event.inputs.tag }}'"
            exit 1
          fi
          echo "upload_url=$upload_url" >> $GITHUB_OUTPUT

          asset_ids=$(echo "$release" | jq -r '.assets[].id')
          echo "asset_ids=$asset_ids" >> $GITHUB_OUTPUT

      # Удаляем старые ассеты
      - name: Delete old assets
        if: ${{ steps.get_release.outputs.asset_ids != '' }}
        run: |
          for id in ${{ steps.get_release.outputs.asset_ids }}; do
            echo "Deleting asset $id"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/assets/$id
          done

      # Загружаем новый ассет
      - name: Upload new asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./ficbook-export.user.js
          asset_name: ficbook-export.user.js
          asset_content_type: application/javascript
