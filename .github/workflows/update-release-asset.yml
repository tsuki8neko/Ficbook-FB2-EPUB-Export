name: Update Release Asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag of the release to update (example: 1.7.0)"
        required: true

jobs:
  update-asset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build userscript
        run: npm run build

      # Проверяем, что релиз существует
      - name: Get release by tag
        id: get_release
        run: |
          echo "Fetching release for tag: ${{ github.event.inputs.tag }}"
          release=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.inputs.tag }})

          echo "$release" > release.json

          upload_url=$(jq -r '.upload_url // empty' release.json)
          assets=$(jq -r '.assets // empty' release.json)

          if [ -z "$upload_url" ]; then
            echo "ERROR: Release with tag '${{ github.event.inputs.tag }}' not found."
            exit 1
          fi

          echo "upload_url=$upload_url" >> $GITHUB_OUTPUT
          echo "assets=$assets" >> $GITHUB_OUTPUT

      # Удаляем старые ассеты
      - name: Delete old assets
        if: ${{ steps.get_release.outputs.assets != '' }}
        run: |
          echo '${{ steps.get_release.outputs.assets }}' | jq -r '.[].id' | while read id; do
            echo "Deleting asset $id"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/assets/$id
          done

      # Загружаем новый ассет
      - name: Upload new asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./dist/ficbook-export.user.js
          asset_name: ficbook-export.user.js
          asset_content_type: application/javascript
