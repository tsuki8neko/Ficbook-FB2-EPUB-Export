name: Update Release Asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag of the release to update (example: v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  update-asset:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      # Копируем собранный файл в корень
      - name: Copy built userscript to root
        run: cp build/ficbook-export.user.js ficbook-export.user.js

      # Коммитим обновлённый файл
      - name: Commit updated userscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ficbook-export.user.js
          git commit -m "Update userscript for release ${{ github.event.inputs.tag }}" || echo "No changes to commit"
          git push origin master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Обновляем ассет в релизе
      - name: Upload file to release
        run: |
          gh release upload "${{ github.event.inputs.tag }}" build/ficbook-export.user.js --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
